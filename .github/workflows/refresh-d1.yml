name: refresh-d1

# JPX 銘柄一覧 + Yahoo Finance を取得し、本番 Cloudflare D1 を 24 時間ごとに更新する。
# blog/admin 系テーブルは触らない(scripts/sync-remote.ts のスコープ外)。

on:
  schedule:
    # JST 04:00 = UTC 19:00。JPX/Yahoo の前日終値確定後に走らせる。
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: read

# 同時起動を禁止(前回 run が長引いた場合はキューに積む)
concurrency:
  group: refresh-d1
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch id seed from production D1
        run: pnpm db:fetch-id-seed --out /tmp/id-seed.json

      - name: Regenerate CSVs from JPX + Yahoo Finance
        env:
          ID_SEED_JSON: /tmp/id-seed.json
        run: pnpm db:refresh-csv

      - name: Sync diffs to production D1
        run: pnpm db:sync-remote
