name: pipeline-6h

# 6 時間ごと (UTC 00/06/12/18 = JST 09/15/21/03)。
# 市場指数の再取得 → AI 予測の生成 → 本番 D1 反映。
# 詳細は scripts/lib/schedule.ts の SCHEDULE 配列 (frequency: "every-6h")。

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-6h
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run every-6h pipeline
        run: pnpm pipeline every-6h
