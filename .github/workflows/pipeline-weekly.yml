name: pipeline-weekly

# 土曜 JST 06:00 (UTC 21:00 金曜)。
# EDINET 過去 8 日補修 + ai-stock-trend のローテーション 1/4。
# 詳細は scripts/lib/schedule.ts の SCHEDULE 配列(frequency: "weekly")。

on:
  schedule:
    - cron: "0 21 * * 5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      EDINET_R2: remote
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run weekly pipeline
        run: pnpm pipeline weekly
