name: pipeline-weekly

# 週次パイプライン (GH Actions runner 担当分のみ)。
# 土曜 JST 06:00 = 金曜 UTC 21:00
#
# 含むタスク (scripts/lib/schedule.ts weekly + runner=gh|both):
#   1. edinet-pipeline (backfill: 8)  : 過去 8 日ぶんの取りこぼし補修
#   2. sync-remote
#
# 含まないタスク (ローカル AI 専用):
#   - ai-stock-trend (rotation 1/4)
#   → 開発者が「pnpm pipeline weekly --runner=local」を後追いで叩く

on:
  schedule:
    - cron: "0 21 * * 5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-weekly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      EDITNET_API_KEY: ${{ secrets.EDITNET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Bootstrap local D1 (no fetch)
        run: pnpm db:seed-local --no-fetch

      - name: Run weekly (gh runner only)
        run: pnpm pipeline weekly --runner=gh
