name: pipeline-daily

# 日次パイプライン (GH Actions runner 担当分のみ)。
# JST 16:00 = UTC 07:00 (東証 15:30 引け後、Yahoo に終値が反映された頃)。
#
# 含むタスク (scripts/lib/schedule.ts daily + runner=gh|both):
#   1. fetch-jpx              : JPX 銘柄一覧を再取得
#   2. fetch-yahoo-snapshot   : 全銘柄の quote/chart 更新 (~10-15 分)
#   3. fetch-market-indices   : 指数値を確定
#   4. edinet-pipeline        : EDINET XBRL を R2 へ
#   5. derive-highlights      : SQL ルールベースで homepage_highlights を更新
#   6. sync-remote            : 上記すべての結果を本番 D1 へ反映
#
# 含まないタスク (ローカル AI 専用):
#   - ai-stock-trend / ai-market-brief (サブスク Claude が必要)
#   → 開発者が「pnpm pipeline daily --runner=local」を後追いで叩く

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # EDINET API キー (Cloudflare secret 名が typo のまま運用されているのに合わせる)
      EDITNET_API_KEY: ${{ secrets.EDITNET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Bootstrap local D1 (no fetch)
        run: pnpm db:seed-local --no-fetch

      - name: Run daily (gh runner only)
        run: pnpm pipeline daily --runner=gh
