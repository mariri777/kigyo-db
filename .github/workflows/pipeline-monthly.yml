name: pipeline-monthly

# 月初 JST 05:00 (UTC 20:00 月末)。
# ai-valuation + ai-positioning のローテーション 1/8。
# 詳細は scripts/lib/schedule.ts の SCHEDULE 配列(frequency: "monthly")。

on:
  schedule:
    - cron: "0 20 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pipeline-monthly
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      EDINET_R2: remote
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run monthly pipeline
        run: pnpm pipeline monthly
