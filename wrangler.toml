# Cloudflare Workers / Pages 設定。
# OpenNext がビルドした worker.js と静的アセット、D1 バインディングを宣言する。

name = "cho-kigyo-db"

compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Workers Logs (1102 等の障害調査用)
[observability]
enabled = true

# D1 データベース: env.DB でアクセスする
[[d1_databases]]
binding = "DB"
database_name = "cho-kigyo-db-database"
database_id = "ae691639-98d9-49fb-82f4-517f8c47f9dd"
migrations_dir = "drizzle"
