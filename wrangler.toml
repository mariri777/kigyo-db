# Cloudflare Workers / Pages 設定。
# OpenNext がビルドした worker.js と静的アセット、D1 バインディングを宣言する。

name = "cho-kigyo-db"

compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Workers Logs (1102 等の障害調査用)
[observability]
enabled = true

# CPU 時間上限。Workers Paid プラン($5/月)が必須。
# 3,572 銘柄を読む集計ページ(/、/themes 等)が SSR 時に
# 重い処理を行うため、デフォルトの 50ms ではすぐ Worker exceeded resource limits になる。
# 最大 30,000ms(30 秒)まで設定可能。
# 注: Paid プラン加入前は下記をコメントアウトして deploy する必要あり(Free だと弾かれる)。
# [limits]
# cpu_ms = 30000

# D1 データベース: env.DB でアクセスする
[[d1_databases]]
binding = "DB"
database_name = "cho-kigyo-db-database"
database_id = "ae691639-98d9-49fb-82f4-517f8c47f9dd"
migrations_dir = "drizzle"
